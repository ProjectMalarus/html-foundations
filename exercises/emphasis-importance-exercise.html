<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emphasis & Importance Exercise</title>
</head>
<body>
    <h1><em>Emphasis</em> and <strong>importance</strong></h1>

    <p>
        My new coffee machine is called <strong><em>The Percolator 2000</em></strong>. It produces the most
        <em>sublime</em> and <em>wonderful</em> brew.
    </p>

    <p>
        In the dead of winter, it will be <strong>cold</strong>. <em><strong>You should wrap up warm to avoid
        falling ill</strong></em>.
    </p>
</body>
</html>
