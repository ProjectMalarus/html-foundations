<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images Test</title>
</head>
<body>
    <h1>Images Tests</h1>

    <br>

    <h2>Test 1: Basic image embed</h2>

        <img src="images/blueberries.jpg" alt="A batch of juicy blueberries" width="400" height="auto">

        <p>
            You should see a picture of some blueberries above.
        </p>

    <h2>Test 2: Basic image title</h2>
        <img
            src="https://github.com/mdn/learning-area/blob/main/html/multimedia-and-embedding/tasks/images/larch.jpg?raw=true"
            alt="Several tall evergreen trees called larches"
            title="A group of evergreen trees">

    <h2>Test 3: Image and caption</h2>
    <figure>
        <img
            src="https://github.com/mdn/learning-area/blob/main/html/multimedia-and-embedding/tasks/images/firefox.png?raw=true"
            alt="An abstract flaming fox wrapping around a blue sphere"
            width="446"
            height="460">
        <figcaption>
            The Mozilla Firefox logo
        </figcaption>
    </figure>
    
</body>
</html>
